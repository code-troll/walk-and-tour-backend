services:
  postgres:
    image: postgres:16-alpine
    container_name: walk-and-tour-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-walk_and_tour}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d walk_and_tour"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: walk-and-tour-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm run migration:run && npm run start:dev"
    env_file:
      - .env
    environment:
      DB_HOST: postgres
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - app_storage:/app/storage

volumes:
  postgres_data:
  app_storage:
